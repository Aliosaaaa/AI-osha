<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accedi | AI Osha</title>
    <meta name="robots" content="noindex, nofollow">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00A8E8;
            --primary-dark: #0088c2;
            --highlight: #F5A623;
            --dark: #0D1117;
            --dark-soft: #161b22;
            --gray-900: #1f2937;
            --gray-700: #374151;
            --gray-500: #6b7280;
            --gray-400: #9ca3af;
            --light: #E8F4FD;
            --white: #ffffff;
            --success: #10b981;
            --error: #ef4444;
            --font-display: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-full: 9999px;
            --transition-base: 250ms ease;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

        body {
            font-family: var(--font-display);
            background-color: var(--dark);
            color: var(--light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        a { color: inherit; text-decoration: none; }

        /* HEADER */
        .header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .header__logo {
            font-size: 1.25rem;
            font-weight: 800;
            color: var(--light);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .text-gradient {
            background: linear-gradient(135deg, var(--primary) 0%, #7dd3fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* MAIN */
        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .login-card {
            background: var(--dark-soft);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 1.5rem;
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .login-card__icon {
            width: 52px;
            height: 52px;
            background: linear-gradient(135deg, rgba(0,168,232,0.2), rgba(0,168,232,0.05));
            border: 1px solid rgba(0,168,232,0.3);
            border-radius: var(--radius-xl);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
        }

        .login-card__icon svg {
            width: 24px;
            height: 24px;
            color: var(--primary);
        }

        .login-card__title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--light);
            margin-bottom: 0.5rem;
        }

        .login-card__subtitle {
            font-size: 0.9rem;
            color: var(--gray-400);
            margin-bottom: 2rem;
        }

        /* FORM */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--gray-400);
            margin-bottom: 0.5rem;
        }

        .form-input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: var(--radius-lg);
            padding: 0.75rem 1rem;
            font-family: var(--font-display);
            font-size: 1rem;
            color: var(--light);
            transition: border-color var(--transition-base), box-shadow var(--transition-base);
            outline: none;
        }

        .form-input::placeholder { color: var(--gray-500); }

        .form-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(0,168,232,0.15);
        }

        .form-input.error {
            border-color: var(--error);
            box-shadow: 0 0 0 3px rgba(239,68,68,0.15);
        }

        .form-forgot {
            text-align: right;
            margin-top: 0.4rem;
        }

        .form-forgot a {
            font-size: 0.8rem;
            color: var(--primary);
            transition: opacity var(--transition-base);
        }

        .form-forgot a:hover { opacity: 0.8; }

        /* ERROR MESSAGE */
        .alert {
            padding: 0.875rem 1rem;
            border-radius: var(--radius-lg);
            font-size: 0.875rem;
            margin-bottom: 1.25rem;
            display: none;
        }

        .alert--error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
        }

        .alert--success {
            background: rgba(16,185,129,0.1);
            border: 1px solid rgba(16,185,129,0.3);
            color: #6ee7b7;
        }

        .alert.visible { display: block; }

        /* BUTTON */
        .btn-login {
            width: 100%;
            padding: 0.875rem 1.5rem;
            background: var(--primary);
            color: var(--white);
            font-family: var(--font-display);
            font-size: 1rem;
            font-weight: 700;
            border: none;
            border-radius: var(--radius-full);
            cursor: pointer;
            transition: background var(--transition-base), transform 150ms ease, box-shadow var(--transition-base);
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-login:hover {
            background: var(--primary-dark);
            box-shadow: 0 0 25px rgba(0,168,232,0.4);
            transform: translateY(-1px);
        }

        .btn-login:active { transform: translateY(0); }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* SPINNER */
        .spinner {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            display: none;
        }

        .btn-login.loading .spinner { display: block; }
        .btn-login.loading .btn-text { display: none; }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* DIVIDER */
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: var(--gray-500);
            font-size: 0.8rem;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.08);
        }

        /* RESET PASSWORD MODE */
        .reset-mode { display: none; }
        .login-mode { display: block; }

        /* BACK LINK */
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            color: var(--primary);
            font-size: 0.875rem;
            margin-top: 1.25rem;
            cursor: pointer;
            background: none;
            border: none;
            font-family: var(--font-display);
            transition: opacity var(--transition-base);
        }

        .back-link:hover { opacity: 0.8; }

        /* FOOTER */
        .login-footer {
            text-align: center;
            padding: 1.5rem;
            font-size: 0.8rem;
            color: var(--gray-500);
        }

        .login-footer a {
            color: var(--gray-400);
            transition: color var(--transition-base);
        }

        .login-footer a:hover { color: var(--primary); }
    </style>
</head>
<body>

    <header class="header">
        <a href="/" class="header__logo">
            AI <span class="text-gradient">Osha</span>
        </a>
    </header>

    <div class="login-wrapper">
        <div class="login-card">

            <!-- ICONA -->
            <div class="login-card__icon">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                </svg>
            </div>

            <!-- MODALITÀ LOGIN -->
            <div id="login-mode">
                <h1 class="login-card__title">Accedi all'Area Clienti</h1>
                <p class="login-card__subtitle">Inserisci le credenziali che ti abbiamo fornito.</p>

                <div id="alert-login" class="alert alert--error" role="alert"></div>

                <form id="login-form" novalidate>
                    <div class="form-group">
                        <label class="form-label" for="email">Email</label>
                        <input class="form-input" type="email" id="email" name="email" placeholder="tuaemail@esempio.it" autocomplete="email" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <input class="form-input" type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
                        <div class="form-forgot">
                            <a href="#" id="forgot-link">Password dimenticata?</a>
                        </div>
                    </div>

                    <button type="submit" class="btn-login" id="login-btn">
                        <span class="btn-text">Accedi</span>
                        <div class="spinner"></div>
                    </button>
                </form>
            </div>

            <!-- MODALITÀ RESET PASSWORD -->
            <div id="reset-mode" style="display:none;">
                <h1 class="login-card__title">Reset Password</h1>
                <p class="login-card__subtitle">Ti invieremo un link per reimpostare la password.</p>

                <div id="alert-reset" class="alert" role="alert"></div>

                <form id="reset-form" novalidate>
                    <div class="form-group">
                        <label class="form-label" for="reset-email">Email</label>
                        <input class="form-input" type="email" id="reset-email" name="reset-email" placeholder="tuaemail@esempio.it" autocomplete="email" required>
                    </div>

                    <button type="submit" class="btn-login" id="reset-btn">
                        <span class="btn-text">Invia link reset</span>
                        <div class="spinner"></div>
                    </button>
                </form>

                <button class="back-link" id="back-to-login">
                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    Torna al login
                </button>
            </div>

        </div>
    </div>

    <footer class="login-footer">
        <a href="/">← Torna al sito</a> &nbsp;·&nbsp; <a href="contatti.html">Supporto</a>
    </footer>

    <script type="module">
        import { login, resetPassword, redirectIfAuth } from "./js/auth.js";

        // Reindirizza se già loggato
        redirectIfAuth("/area-clienti/");

        const loginForm = document.getElementById("login-form");
        const resetForm = document.getElementById("reset-form");
        const loginMode = document.getElementById("login-mode");
        const resetMode = document.getElementById("reset-mode");
        const forgotLink = document.getElementById("forgot-link");
        const backToLogin = document.getElementById("back-to-login");
        const alertLogin = document.getElementById("alert-login");
        const alertReset = document.getElementById("alert-reset");
        const loginBtn = document.getElementById("login-btn");
        const resetBtn = document.getElementById("reset-btn");

        function showAlert(el, msg, type = "error") {
            el.textContent = msg;
            el.className = `alert alert--${type} visible`;
        }

        function setLoading(btn, loading) {
            btn.disabled = loading;
            btn.classList.toggle("loading", loading);
        }

        // Mostra reset password
        forgotLink.addEventListener("click", (e) => {
            e.preventDefault();
            loginMode.style.display = "none";
            resetMode.style.display = "block";
            alertLogin.classList.remove("visible");
        });

        // Torna al login
        backToLogin.addEventListener("click", () => {
            resetMode.style.display = "none";
            loginMode.style.display = "block";
            alertReset.classList.remove("visible");
        });

        // LOGIN
        loginForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            if (!email || !password) {
                showAlert(alertLogin, "Inserisci email e password.");
                return;
            }

            setLoading(loginBtn, true);
            alertLogin.classList.remove("visible");

            try {
                await login(email, password);
                window.location.href = "/area-clienti/";
            } catch (err) {
                const msg = errMsg(err.code);
                showAlert(alertLogin, msg);
                setLoading(loginBtn, false);
            }
        });

        // RESET PASSWORD
        resetForm.addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("reset-email").value.trim();

            if (!email) {
                showAlert(alertReset, "Inserisci la tua email.");
                return;
            }

            setLoading(resetBtn, true);
            alertReset.classList.remove("visible");

            try {
                await resetPassword(email);
                showAlert(alertReset, "Email inviata! Controlla la tua casella di posta.", "success");
                setLoading(resetBtn, false);
            } catch (err) {
                showAlert(alertReset, "Email non trovata. Controlla di aver inserito l'indirizzo corretto.");
                setLoading(resetBtn, false);
            }
        });

        // Messaggi di errore Firebase in italiano
        function errMsg(code) {
            switch (code) {
                case "auth/user-not-found":
                case "auth/wrong-password":
                case "auth/invalid-credential":
                    return "Email o password errati. Riprova.";
                case "auth/too-many-requests":
                    return "Troppi tentativi. Attendi qualche minuto o reimposta la password.";
                case "auth/user-disabled":
                    return "Account disabilitato. Contatta il supporto.";
                case "auth/network-request-failed":
                    return "Errore di connessione. Controlla la tua rete.";
                default:
                    return "Si è verificato un errore. Riprova.";
            }
        }
    </script>
</body>
</html>
