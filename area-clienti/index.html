<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Area Studenti | AI Osha</title>
    <meta name="robots" content="noindex, nofollow">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00A8E8;
            --primary-dark: #0088c2;
            --highlight: #F5A623;
            --dark: #0D1117;
            --dark-soft: #161b22;
            --gray-900: #1f2937;
            --gray-800: #2d3748;
            --gray-700: #374151;
            --gray-600: #4b5563;
            --gray-500: #6b7280;
            --gray-400: #9ca3af;
            --light: #E8F4FD;
            --white: #ffffff;
            --success: #10b981;
            --error: #ef4444;
            --warning: #f59e0b;
            --purple: #a855f7;
            --border: rgba(255,255,255,0.08);
            --font-display: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
            --radius-sm: 0.375rem;
            --radius-md: 0.5rem;
            --radius-lg: 0.75rem;
            --radius-xl: 1rem;
            --radius-2xl: 1.5rem;
            --radius-full: 9999px;
            --transition-base: 250ms ease;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { -webkit-font-smoothing: antialiased; }

        body {
            font-family: var(--font-display);
            background-color: var(--dark);
            color: var(--light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        a { color: inherit; text-decoration: none; }

        /* ── LOADING ── */
        #loading-screen {
            position: fixed; inset: 0;
            background: var(--dark);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            gap: 1.25rem;
            z-index: 9999;
            transition: opacity 0.4s ease;
        }
        #loading-screen.hidden { opacity: 0; pointer-events: none; }
        #loading-screen .brand { font-size: 1.5rem; font-weight: 800; }
        .loading-dots { display: flex; gap: 0.5rem; }
        .loading-dot {
            width: 8px; height: 8px;
            background: var(--primary); border-radius: 50%;
            animation: pulse 1.2s ease-in-out infinite;
        }
        .loading-dot:nth-child(2) { animation-delay: 0.2s; }
        .loading-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }

        /* ── HEADER ── */
        .header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(13,17,23,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            padding: 0 1.5rem;
        }
        .header__inner {
            max-width: 1100px; margin: 0 auto;
            display: flex; align-items: center;
            justify-content: space-between;
            height: 64px; gap: 1rem;
        }
        .header__left { display: flex; align-items: center; gap: 1rem; }
        .header__logo { font-size: 1.2rem; font-weight: 800; }
        .header__badge {
            font-size: 0.7rem; font-weight: 700;
            padding: 0.2rem 0.65rem;
            background: rgba(0,168,232,0.1);
            border: 1px solid rgba(0,168,232,0.25);
            border-radius: var(--radius-full);
            color: var(--primary);
            text-transform: uppercase; letter-spacing: 0.06em;
        }
        .text-gradient {
            background: linear-gradient(135deg, var(--primary) 0%, #7dd3fc 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
        }
        .header__right { display: flex; align-items: center; gap: 1rem; }
        .header__email { font-size: 0.85rem; color: var(--gray-400); display: none; }
        @media (min-width: 600px) { .header__email { display: block; } }

        .btn-logout {
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--border);
            color: var(--gray-400);
            font-family: var(--font-display); font-size: 0.85rem; font-weight: 600;
            padding: 0.5rem 1rem; border-radius: var(--radius-full);
            cursor: pointer; transition: all var(--transition-base);
            display: flex; align-items: center; gap: 0.4rem;
        }
        .btn-logout:hover {
            background: rgba(239,68,68,0.1);
            border-color: rgba(239,68,68,0.3);
            color: #fca5a5;
        }

        /* ── MAIN ── */
        main {
            flex: 1;
            max-width: 1100px; margin: 0 auto; width: 100%;
            padding: 2rem 1.5rem 5rem;
        }

        /* ── WELCOME BANNER ── */
        .welcome {
            background: linear-gradient(135deg, rgba(0,168,232,0.08) 0%, rgba(0,136,194,0.03) 100%);
            border: 1px solid rgba(0,168,232,0.18);
            border-radius: var(--radius-2xl);
            padding: 1.75rem 2rem;
            margin-bottom: 2.5rem;
            display: flex; align-items: center; gap: 1.25rem;
        }
        .welcome__emoji { font-size: 2rem; flex-shrink: 0; }
        .welcome__name { font-size: 1.35rem; font-weight: 700; margin-bottom: 0.2rem; }
        .welcome__sub { font-size: 0.9rem; color: var(--gray-400); }

        /* ── BADGE PREMIUM ── */
        .premium-banner {
            background: linear-gradient(135deg, rgba(168,85,247,0.12) 0%, rgba(245,166,35,0.08) 100%);
            border: 1px solid rgba(168,85,247,0.3);
            border-radius: var(--radius-xl);
            padding: 1rem 1.5rem;
            margin-bottom: 2rem;
            display: flex; align-items: center; gap: 0.75rem;
            display: none;
        }
        .premium-banner.visible { display: flex; }
        .premium-banner__icon { font-size: 1.3rem; }
        .premium-banner__text { font-size: 0.9rem; font-weight: 600; color: #d8b4fe; }

        /* ── SEZIONE CORSO ── */
        .corso-section { margin-bottom: 3rem; }

        .corso-header {
            display: flex; align-items: center;
            justify-content: space-between;
            gap: 1rem; margin-bottom: 1.25rem;
            flex-wrap: wrap;
        }
        .corso-header__left { display: flex; align-items: center; gap: 0.85rem; }
        .corso-icon {
            width: 42px; height: 42px; border-radius: var(--radius-lg);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem; flex-shrink: 0;
        }
        .corso-icon--blue   { background: rgba(0,168,232,0.12); border: 1px solid rgba(0,168,232,0.22); }
        .corso-icon--amber  { background: rgba(245,166,35,0.12); border: 1px solid rgba(245,166,35,0.22); }
        .corso-icon--green  { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.22); }
        .corso-icon--purple { background: rgba(168,85,247,0.12); border: 1px solid rgba(168,85,247,0.22); }

        .corso-nome { font-size: 1.05rem; font-weight: 700; }
        .corso-sub  { font-size: 0.8rem; color: var(--gray-500); margin-top: 0.1rem; }

        .badge-accesso {
            font-size: 0.72rem; font-weight: 700;
            padding: 0.25rem 0.7rem; border-radius: var(--radius-full);
            text-transform: uppercase; letter-spacing: 0.05em;
            white-space: nowrap;
        }
        .badge-accesso--attivo   { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
        .badge-accesso--bloccato { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: var(--gray-500); }

        /* ── CORSO BLOCCATO ── */
        .corso-locked-box {
            background: var(--dark-soft);
            border: 1px dashed rgba(255,255,255,0.1);
            border-radius: var(--radius-xl);
            padding: 1.75rem 2rem;
            text-align: center;
            color: var(--gray-500);
        }
        .corso-locked-box__icon { font-size: 2rem; margin-bottom: 0.75rem; }
        .corso-locked-box__title { font-size: 0.95rem; font-weight: 600; color: var(--gray-400); margin-bottom: 0.4rem; }
        .corso-locked-box__desc  { font-size: 0.85rem; margin-bottom: 1.25rem; line-height: 1.5; }
        .btn-acquista {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.6rem 1.4rem;
            background: rgba(245,166,35,0.1);
            border: 1px solid rgba(245,166,35,0.3);
            border-radius: var(--radius-full);
            color: #fcd34d; font-family: var(--font-display);
            font-size: 0.875rem; font-weight: 700;
            cursor: pointer; transition: all var(--transition-base);
        }
        .btn-acquista:hover { background: rgba(245,166,35,0.2); }

        /* ── GRID MODULI ── */
        .moduli-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }

        /* ── CARD MODULO ── */
        .card {
            background: var(--dark-soft);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 1.5rem;
            display: flex; flex-direction: column; gap: 1rem;
            transition: border-color var(--transition-base), transform var(--transition-base), box-shadow var(--transition-base);
            position: relative; overflow: hidden;
            cursor: pointer;
        }
        .card:hover {
            border-color: rgba(0,168,232,0.35);
            transform: translateY(-2px);
            box-shadow: 0 16px 40px rgba(0,0,0,0.35);
        }

        .card__top { display: flex; align-items: flex-start; justify-content: space-between; gap: 0.75rem; }
        .card__icon {
            width: 46px; height: 46px; border-radius: var(--radius-lg);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.25rem; flex-shrink: 0;
        }
        .card__icon--blue   { background: rgba(0,168,232,0.12); border: 1px solid rgba(0,168,232,0.22); }
        .card__icon--amber  { background: rgba(245,166,35,0.12); border: 1px solid rgba(245,166,35,0.22); }
        .card__icon--green  { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.22); }
        .card__icon--purple { background: rgba(168,85,247,0.12); border: 1px solid rgba(168,85,247,0.22); }
        .card__icon--red    { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.22); }

        .card__tag {
            font-size: 0.68rem; font-weight: 700;
            padding: 0.2rem 0.55rem; border-radius: var(--radius-full);
            text-transform: uppercase; letter-spacing: 0.05em; flex-shrink: 0;
            background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7;
        }

        .card__title { font-size: 1rem; font-weight: 700; margin-bottom: 0.3rem; }
        .card__desc  { font-size: 0.875rem; color: var(--gray-400); line-height: 1.5; }

        .card__footer { display: flex; align-items: center; margin-top: auto; }
        .card__cta {
            font-size: 0.875rem; font-weight: 600; color: var(--primary);
            display: flex; align-items: center; gap: 0.3rem;
        }

        /* ── DIVIDER ── */
        .section-divider {
            border: none;
            border-top: 1px solid var(--border);
            margin: 2.5rem 0;
        }

        /* ── SUPPORT BOX ── */
        .support-box {
            background: var(--dark-soft);
            border: 1px solid var(--border);
            border-radius: var(--radius-xl);
            padding: 1.5rem 2rem;
            display: flex; align-items: center;
            justify-content: space-between; gap: 1rem; flex-wrap: wrap;
        }
        .support-box h3 { font-size: 1rem; font-weight: 700; margin-bottom: 0.25rem; }
        .support-box p  { font-size: 0.875rem; color: var(--gray-400); }
        .btn-support {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.65rem 1.25rem;
            background: rgba(0,168,232,0.08);
            border: 1px solid rgba(0,168,232,0.25);
            border-radius: var(--radius-full);
            color: var(--primary); font-family: var(--font-display);
            font-size: 0.875rem; font-weight: 700;
            cursor: pointer; transition: all var(--transition-base); white-space: nowrap;
        }
        .btn-support:hover { background: rgba(0,168,232,0.18); box-shadow: 0 0 20px rgba(0,168,232,0.2); }

        /* ── CARD BLOCCATA ── */
        .card.locked {
            opacity: 0.55;
            cursor: default;
            pointer-events: none;
        }
        .card.locked:hover { transform: none; box-shadow: none; border-color: var(--border); }
        .card__lock-label {
            font-size: 0.75rem; color: var(--gray-500);
            display: flex; align-items: center; gap: 0.35rem;
        }
        .card__tag--locked {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            color: var(--gray-500);
        }

        /* ── BANNER SBLOCCO CORSO ── */
        .corso-unlock-bar {
            margin-top: 1rem;
            padding: 0.85rem 1.25rem;
            background: rgba(245,166,35,0.06);
            border: 1px solid rgba(245,166,35,0.2);
            border-radius: var(--radius-lg);
            display: flex; align-items: center; justify-content: space-between;
            gap: 1rem; flex-wrap: wrap;
        }
        .corso-unlock-bar__text { font-size: 0.85rem; color: #fcd34d; }
        .btn-sblocca {
            display: inline-flex; align-items: center; gap: 0.4rem;
            padding: 0.5rem 1.1rem;
            background: rgba(245,166,35,0.12);
            border: 1px solid rgba(245,166,35,0.35);
            border-radius: var(--radius-full);
            color: #fcd34d; font-family: var(--font-display);
            font-size: 0.8rem; font-weight: 700;
            white-space: nowrap; pointer-events: all; cursor: pointer;
            transition: background var(--transition-base);
        }
        .btn-sblocca:hover { background: rgba(245,166,35,0.22); }
    </style>
</head>
<body>

<!-- LOADING -->
<div id="loading-screen">
    <div class="brand">AI <span class="text-gradient">Osha</span></div>
    <div class="loading-dots">
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
    </div>
</div>

<!-- HEADER -->
<header class="header">
    <div class="header__inner">
        <div class="header__left">
            <a href="/" class="header__logo">AI <span class="text-gradient">Osha</span></a>
            <span class="header__badge">Area Studenti</span>
        </div>
        <div class="header__right">
            <span class="header__email" id="user-email"></span>
            <button class="btn-logout" id="logout-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                    <polyline points="16 17 21 12 16 7"/>
                    <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                Esci
            </button>
        </div>
    </div>
</header>

<main>

    <!-- WELCOME -->
    <div class="welcome">
        <div class="welcome__emoji">👋</div>
        <div>
            <div class="welcome__name" id="welcome-name">Bentornato!</div>
            <div class="welcome__sub">Questa è la tua area personale con tutti i contenuti che hai sbloccato.</div>
        </div>
    </div>

    <!-- BANNER PREMIUM -->
    <div class="premium-banner" id="premium-banner">
        <span class="premium-banner__icon">👑</span>
        <span class="premium-banner__text">Hai accesso <strong>Premium</strong> — tutti i corsi e i contenuti sono sbloccati per te.</span>
    </div>

    <!-- CORSI (generato via JS) -->
    <div id="corsi-container"></div>

    <!-- SUPPORTO -->
    <div class="support-box">
        <div>
            <h3>Hai bisogno di aiuto?</h3>
            <p>Rispondo entro 24 ore nei giorni lavorativi.</p>
        </div>
        <a href="mailto:info@aiosha.it" class="btn-support">
            <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
            </svg>
            Contattami
        </a>
    </div>

</main>

<script type="module">
import { requireAuth, logout } from "../js/auth.js";
import { db } from "../js/firebase-config.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

// ═══════════════════════════════════════════════════════
// CATALOGO CORSI
// Per aggiungere un corso: aggiungi un oggetto in CORSI
// Per aggiungere un modulo: aggiungi un oggetto in moduli[]
// Per modificare chi vede cosa: cambia l'array "corsi" dello studente in Firestore
// ═══════════════════════════════════════════════════════
const CORSI = [
    {
        id: "pmi",
        nome: "AI in Pratica per PMI",
        sub: "Il metodo completo per applicare l'AI al tuo business",
        icon: "🏢",
        iconClass: "corso-icon--blue",
        moduli: [
            {
                id: "pmi-video",
                icon: "🎥", iconClass: "card__icon--blue",
                title: "Videolezioni — Corso Completo",
                desc: "Tutte le sessioni registrate del corso AI in Pratica per PMI. Guarda quando vuoi, quante volte vuoi.",
                cta: "Guarda i video",
                link: "#"  // ← sostituire con link reale (YouTube non listato / Vimeo / Google Drive)
            },
            {
                id: "pmi-slide",
                icon: "📊", iconClass: "card__icon--blue",
                title: "Slide del Corso PDF",
                desc: "Tutte le slide in PDF. Scaricale e tienile come riferimento rapido.",
                cta: "Scarica le slide",
                link: "#"
            },
            {
                id: "pmi-prompt",
                icon: "🤖", iconClass: "card__icon--green",
                title: "50 Prompt Pronti per PMI",
                desc: "La libreria di prompt testati per ChatGPT e Claude, pensati per piccole e medie imprese.",
                cta: "Apri la libreria",
                link: "#"
            },
            {
                id: "pmi-template",
                icon: "⚙️", iconClass: "card__icon--amber",
                title: "Template e Automazioni",
                desc: "Workflow pronti per Make e Zapier. Importa e adatta al tuo business in pochi minuti.",
                cta: "Scarica i template",
                link: "#"
            }
        ]
    },
    {
        id: "immobiliare",
        nome: "AI in Pratica per Agenzie Immobiliari",
        sub: "Strumenti AI specifici per il settore immobiliare",
        icon: "🏠",
        iconClass: "corso-icon--amber",
        moduli: [
            {
                id: "immo-video",
                icon: "🎥", iconClass: "card__icon--amber",
                title: "Videolezioni — Corso Immobiliare",
                desc: "Tutte le sessioni registrate del corso AI per agenzie immobiliari.",
                cta: "Guarda i video",
                link: "#"
            },
            {
                id: "immo-prompt",
                icon: "🤖", iconClass: "card__icon--green",
                title: "Prompt per Immobiliare",
                desc: "Annunci, email ai clienti, valutazioni, contratti: prompt pronti all'uso per ogni momento del tuo lavoro.",
                cta: "Apri la libreria",
                link: "#"
            },
            {
                id: "immo-slide",
                icon: "📊", iconClass: "card__icon--amber",
                title: "Slide del Corso PDF",
                desc: "Le slide complete del corso immobiliare in PDF.",
                cta: "Scarica le slide",
                link: "#"
            }
        ]
    }
    // ← AGGIUNGI QUI ALTRI CORSI FUTURI con la stessa struttura
];

// ═══════════════════════════════════════════════════════
// AVVIO — Auth + caricamento dati studente
// ═══════════════════════════════════════════════════════
const user = await requireAuth("/login.html");

document.getElementById("user-email").textContent = user.email;

document.getElementById("logout-btn").addEventListener("click", async () => {
    await logout();
    window.location.href = "/login.html";
});

// Carica documento studente da Firestore
const snap = await getDoc(doc(db, "studenti", user.uid));
const studente = snap.exists() ? snap.data() : {};

// Dati studente
const nome     = studente.nome ?? user.email.split("@")[0];
const premium  = studente.premium === true;
const corsiUtente = premium ? CORSI.map(c => c.id) : (studente.corsi ?? []);

// Aggiorna welcome
document.getElementById("welcome-name").textContent = `Bentornato, ${nome}!`;

// Mostra banner premium
if (premium) {
    document.getElementById("premium-banner").classList.add("visible");
}

// ═══════════════════════════════════════════════════════
// RENDERING
// ═══════════════════════════════════════════════════════
const container = document.getElementById("corsi-container");

CORSI.forEach((corso, idx) => {
    const hasAccess = corsiUtente.includes(corso.id);

    const section = document.createElement("div");
    section.className = "corso-section";

    const badgeHTML = hasAccess
        ? `<span class="badge-accesso badge-accesso--attivo">✓ Attivo</span>`
        : `<span class="badge-accesso badge-accesso--bloccato">🔒 Bloccato</span>`;

    // Mostra tutti i moduli — sbloccati o bloccati
    const cardsHTML = corso.moduli.map(m => {
        if (hasAccess) {
            return `
                <div class="card" onclick="${m.link !== '#' ? `window.open('${m.link}','_blank')` : ''}">
                    <div class="card__top">
                        <div class="card__icon ${m.iconClass}">${m.icon}</div>
                        <span class="card__tag">Incluso</span>
                    </div>
                    <div>
                        <div class="card__title">${m.title}</div>
                        <div class="card__desc">${m.desc}</div>
                    </div>
                    <div class="card__footer">
                        <span class="card__cta">${m.cta} →</span>
                    </div>
                </div>`;
        } else {
            return `
                <div class="card locked">
                    <div class="card__top">
                        <div class="card__icon ${m.iconClass}" style="filter:grayscale(1)">${m.icon}</div>
                        <span class="card__tag card__tag--locked">🔒 Bloccato</span>
                    </div>
                    <div>
                        <div class="card__title">${m.title}</div>
                        <div class="card__desc">${m.desc}</div>
                    </div>
                </div>`;
        }
    }).join("");

    // Banner sblocco (solo se non ha accesso)
    const unlockBar = hasAccess ? "" : `
        <div class="corso-unlock-bar">
            <span class="corso-unlock-bar__text">Acquista il corso per sbloccare tutti i ${corso.moduli.length} contenuti.</span>
            <a href="mailto:info@aiosha.it?subject=Voglio%20acquistare%3A%20${encodeURIComponent(corso.nome)}" class="btn-sblocca">Sblocca questo corso →</a>
        </div>`;

    section.innerHTML = `
        <div class="corso-header">
            <div class="corso-header__left">
                <div class="corso-icon ${corso.iconClass}">${corso.icon}</div>
                <div>
                    <div class="corso-nome">${corso.nome}</div>
                    <div class="corso-sub">${corso.sub}</div>
                </div>
            </div>
            ${badgeHTML}
        </div>
        <div class="moduli-grid">${cardsHTML}</div>
        ${unlockBar}
    `;

    container.appendChild(section);

    if (idx < CORSI.length - 1) {
        const hr = document.createElement("hr");
        hr.className = "section-divider";
        container.appendChild(hr);
    }
});

// Nascondi loading
document.getElementById("loading-screen").classList.add("hidden");
</script>
</body>
</html>
